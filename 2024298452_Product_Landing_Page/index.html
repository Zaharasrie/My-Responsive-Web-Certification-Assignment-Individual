<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusMate Smart Lamp</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header id="header">

  <img
  id="header-img"
  src="https://img.freepik.com/premium-vector/modern-focus-word-art-with-goal-icon-focus-your-goal-focus-typography_1227032-41.jpg"
  alt="FocusMate Logo">
  

  <nav id="nav-bar">
    <a class="nav-link" href="#features">Features</a>
    <a class="nav-link" href="#video-section">Demo</a>
    <a class="nav-link" href="#pricing">Get It</a>
  </nav>

</header>


<section id="features" class="section">

  <h2>Smart Lighting for Better Focus</h2>

  <div class="flex-container">

    <div class="card">
      <h3>Auto Brightness</h3>
      <p>Adjusts light based on your environment.</p>
    </div>

    <div class="card">
      <h3>Eye Comfort</h3>
      <p>Reduces strain during long study sessions.</p>
    </div>

    <div class="card">
      <h3>Timer Mode</h3>
      <p>Helps you manage study breaks.</p>
    </div>

  </div>

</section>


<section id="video-section" class="section">

  <h2>See How It Works</h2>

<iframe
  id="video"
  width="560"
  height="315"
  src="https://www.youtube.com/embed/dQw4w9WgXcQ"
  title="YouTube video player"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>

</section>


<section id="pricing" class="section">

  <h2>Join the Focus Revolution</h2>

  <p>Enter your email to get early access.</p>

  <form id="form" action="https://www.freecodecamp.org/email-submit">

    <input id="email" type="email" name="email" placeholder="Enter your email address" required>
    

    <input
      id="submit"
      type="submit"
      value="Notify Me"
    >

  </form>

</section>

</body>
</html>
